{% extends "base.html" %}
{% set hide_navbar = true %}
{% block title %}Log In - AI FindIt{% endblock %}

{% block content %}
<div class="min-h-screen w-full flex items-center justify-center px-4 relative overflow-hidden bg-gray-50 dark:bg-dark-900">
    <!-- Abstract Background Shapes -->
    <div class="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 rounded-full bg-brand-400/20 blur-3xl mix-blend-multiply dark:mix-blend-screen pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-indigo-500/20 blur-3xl mix-blend-multiply dark:mix-blend-screen pointer-events-none"></div>

    <!-- Theme Toggle Floating -->
    <button @click="toggleTheme()" class="absolute top-6 right-6 z-50 bg-white/50 dark:bg-dark-800/50 backdrop-blur-md w-10 h-10 rounded-full border border-gray-200 dark:border-dark-border flex items-center justify-center text-gray-600 dark:text-gray-300 hover:text-brand-600 dark:hover:text-brand-400 shadow-sm transition">
        <i class="fa-solid" :class="isDark ? 'fa-sun' : 'fa-moon'"></i>
    </button>

    <div class="w-full max-w-md animate-fade-in relative z-10">
        <div class="bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-border rounded-2xl shadow-2xl p-8 sm:p-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <a href="{{ url_for('index') }}" class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-brand-50 dark:bg-brand-900/30 text-brand-600 mb-6 group transition">
                    <i class="fa-solid fa-radar fa-spin-pulse text-2xl group-hover:scale-110 transition-transform"></i>
                </a>
                <h2 class="text-2xl sm:text-3xl font-display font-bold text-gray-900 dark:text-white tracking-tight mb-2">Welcome Back</h2>
                <p class="text-sm font-medium text-gray-500 dark:text-gray-400">Log in to your account securely</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
                <!-- Check if 'next' parameter exists in URL for redirection -->
                {% if request.args.get('next') %}
                <input type="hidden" name="next" value="{{ request.args.get('next') }}">
                {% endif %}

                <!-- Email Input -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5" for="email">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" name="email" id="email" required placeholder="name@example.com"
                            class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-dark-900 border border-gray-200 dark:border-dark-border text-gray-900 dark:text-white rounded-xl text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition outline-none shadow-sm block">
                    </div>
                </div>

                <!-- Password Input -->
                <div x-data="{ show: false }">
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300" for="password">Password</label>
                        <a href="#" class="text-xs font-semibold text-brand-600 dark:text-brand-400 hover:text-brand-500 transition">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-400"></i>
                        </div>
                        <input :type="show ? 'text' : 'password'" name="password" id="password" required placeholder="Enter your password"
                            class="w-full pl-10 pr-10 py-2.5 bg-gray-50 dark:bg-dark-900 border border-gray-200 dark:border-dark-border text-gray-900 dark:text-white rounded-xl text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition outline-none shadow-sm block">
                        <button type="button" @click="show = !show" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none">
                            <i class="fa-regular" :class="show ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center">
                    <input type="checkbox" name="remember" id="remember" class="w-4 h-4 text-brand-600 bg-gray-50 border-gray-300 rounded focus:ring-brand-500 focus:ring-2 dark:bg-dark-900 dark:border-gray-600 dark:checked:bg-brand-600">
                    <label for="remember" class="ml-2 text-sm font-medium text-gray-600 dark:text-gray-400 select-none cursor-pointer">Remember me</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-lg shadow-brand-500/20 text-sm font-bold text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition transform hover:-translate-y-0.5 mt-2">
                    Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-8 text-center border-t border-gray-100 dark:border-dark-border pt-6">
                <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">
                    Don't have an account? 
                    <a href="{{ url_for('register') }}" class="font-bold text-brand-600 dark:text-brand-400 hover:text-brand-500 hover:underline transition">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
