{% extends "base.html" %}
{% set hide_navbar = true %}
{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="row align-items-center justify-content-center min-vh-100 fade-in-up text-center">
  <div class="col-md-6 col-lg-5">
    <div class="custom-card p-5">
      <i class="fa-solid fa-triangle-exclamation fa-5x text-danger mb-4"></i>
      <h1 class="fw-bold display-4">500</h1>
      <h3 class="fw-bold mb-3">Internal Server Error</h3>
      <p class="text-muted mb-4">Oops! Something went wrong on our end. Our AI engineers have been notified and are working on it.</p>
      <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4 py-2"><i class="fa-solid fa-home"></i> Go Back Home</a>
    </div>
  </div>
</div>
{% endblock %}
