{% extends "base.html" %}
{% set hide_navbar = true %}
{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="row align-items-center justify-content-center min-vh-100 fade-in-up text-center">
  <div class="col-md-6 col-lg-5">
    <div class="custom-card p-5">
      <i class="fa-solid fa-ghost fa-5x text-muted mb-4"></i>
      <h1 class="fw-bold display-4">404</h1>
      <h3 class="fw-bold mb-3">Page Not Found</h3>
      <p class="text-muted mb-4">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
      <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4 py-2"><i class="fa-solid fa-home"></i> Go Back Home</a>
    </div>
  </div>
</div>
{% endblock %}
